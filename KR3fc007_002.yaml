body:
  text: 第三問第四術求隄都積術曰置西頭高倍之加東頭高又並西頭上下廣半而乘之又置東頭高倍乏加西頭高又並東頭上下廣半而乘之並二位積以正袤乘之六而一得隄積也衡謹案此條乃築隄求積原文也李雲門先生應有注釋抄本闕脫特為補之立方上下高廣如一故以一邊自乘再乘得積若邊數不齊則必齊其不齊以致其齊乃可相乘得積一面不齊者止須兩邊相並折半即齊若此隄積各邊不齊而東西高名最非僅兩邊相並折半之法所能齊也故必兩相互易各三其數始可致齊以求積西高倍之二數也加東高則三矣東高倍之二數也加西高則三矣東三西三並之則二三而六矣各以取齊之廣乘之得六幂以袤乘之
