body:
  text: 衡謹案此條係求隄漘上廣原文也抄本上備原文而脫注釋因依法以注之幷四郡共一十八萬八千三百二十五人以程功尺每人三尺七寸二分乘之得七五六九尺又以限日九六乘之得六七二五四六二四尺爲隄積六因之得四三五二七七四四尺爲實以正袤三四五六尺除之得一一六七六一尺五又以高二二三尺二除之得五二三尺一二五爲倍上廣一下廣共數內減下廣四六尺七五餘一一六尺四二半之五丈八尺二寸一分爲漘上廣士琳案此二注係從粵東版吳石華廣文覆校本拈出附梓
