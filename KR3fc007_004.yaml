body:
  text: 得六積故六而一得積西頭高三四尺一倍之六八尺二加東頭高三尺一得七一尺三西頭上廣八並下廣七六尺二得八四尺二半之四二尺一以乘七一尺三得三一尺七三為西三冪東頭高三尺一倍之六尺二加西頭高三四尺一得四尺三東頭上廣八下廣一四尺二並得二二尺二半之一一尺一以乘四尺三得四四七尺三三為東三幂並西三幂三一尺七三得三四四九尺六為高廣六幂以乘正袤四八尺得一六五五五四八尺八為六因積以六除之得二七五九二四尺八為隄積第五問第二術求漘上廣術曰以程功乘總人又以限日乘之為積六因之為實以正袤除之又以高除之所得以下廣減之餘又半之即漘上廣
